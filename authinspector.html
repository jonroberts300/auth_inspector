<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticity Inspector — Photo Authenticity Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&family=Bebas+Neue&family=Josefin+Sans:wght@100;300;400;600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #2a2a2a;
    --border-bright: #444;
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --text-dim: #555;
    --accent: #ffffff;
    --warn: #ff4444;
    --warn-soft: #ff444422;
    --ok: #aaffaa;
    --ok-soft: #aaffaa15;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── CONTROLS BAR ── */
  .controls {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .font-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    color: var(--text-primary);
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  select:hover { border-color: var(--text-secondary); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-bright);
    padding: 8px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-ghost:hover { border-color: var(--text-primary); color: var(--text-primary); }

  /* ── DROP ZONE ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .dropzone {
    border: 1px dashed var(--border-bright);
    width: 100%;
    max-width: 520px;
    padding: 64px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--text-secondary);
    background: #ffffff08;
  }

  .dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    font-size: 36px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .drop-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .drop-hint {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── RESULTS ── */
  #results {
    display: none;
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    padding: 32px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border);
  }

  .photo-preview {
    border-right: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    background: #000;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .data-panel {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: var(--surface);
  }

  /* ── VERDICT ── */
  .verdict {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border: 1px solid;
  }

  .verdict.real {
    border-color: var(--ok);
    background: var(--ok-soft);
    color: var(--ok);
  }

  .verdict.suspicious {
    border-color: var(--warn);
    background: var(--warn-soft);
    color: var(--warn);
  }

  .verdict-icon { font-size: 16px; }

  .verdict-text {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ── FLAGS ── */
  .flags {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .flag {
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .flag.warn { color: var(--warn); background: var(--warn-soft); }
  .flag.ok   { color: var(--ok);   background: var(--ok-soft); }
  .flag.info { color: var(--text-secondary); background: transparent; border: 1px solid var(--border); }

  /* ── DATA SECTIONS ── */
  .section-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  .data-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid #1a1a1a;
  }

  .data-row:last-child { border-bottom: none; }

  .data-key {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .data-val {
    font-size: 12px;
    color: var(--text-primary);
    text-align: right;
    word-break: break-word;
  }

  .data-val.missing {
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── CARD CANVAS AREA ── */
  #card-area {
    display: none;
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 32px 32px;
  }

  #card-area h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  #card-canvas {
    display: block;
    max-width: 100%;
    border: 1px solid var(--border);
  }

  .card-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); }

  /* ── HASH ── */
  .hash-val {
    font-size: 9px !important;
    color: var(--text-dim) !important;
    letter-spacing: 0.5px;
    font-family: 'IBM Plex Mono', monospace;
  }

  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .photo-preview { border-right: none; border-bottom: 1px solid var(--border); min-height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div style="cursor:pointer;" onclick="resetTool()">
    <div class="logo">Authenticity Inspector</div>
    <div class="logo-sub">Photo Authenticity Tool</div>
  </div>
</header>

<div class="controls">
  <span class="font-label">Card Font</span>
  <select id="fontSelect" onchange="updateFont()">
    <option value="IBM Plex Mono">IBM Plex Mono — Technical</option>
    <option value="Courier Prime">Courier Prime — Typewriter</option>
    <option value="DM Serif Display">DM Serif Display — Editorial</option>
    <option value="Josefin Sans">Josefin Sans — Geometric</option>
    <option value="Libre Baskerville">Libre Baskerville — Classic</option>
  </select>
  <span class="font-label" style="margin-left:12px;">Theme</span>
  <select id="themeSelect" onchange="updateTheme()">
    <option value="dark">Dark</option>
    <option value="light">Light</option>
  </select>
  <button class="btn-ghost" onclick="document.getElementById('fileInput').click()">Load Photo</button>
</div>

<div class="main" id="mainArea">
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" style="display:none;">
    <div class="drop-icon">⬡</div>
    <div class="drop-title">Drop a photo here</div>
    <div class="drop-hint">JPEG · PNG · TIFF · HEIC · WebP</div>
  </div>
</div>

<div id="results">
  <div class="results-grid">
    <div class="photo-preview">
      <img id="previewImg" src="" alt="Preview">
    </div>
    <div class="data-panel" id="dataPanel">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<div id="card-area">
  <h2>↓ Companion Card — Export as PNG</h2>
  <canvas id="card-canvas"></canvas>
  <div class="card-actions">
    <button class="btn" onclick="downloadCard()">Download Card PNG</button>
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:1px;">Upload this alongside your photo to show authenticity</span>
  </div>
</div>

<script>
// ── FONT FAMILIES FOR CANVAS ──
const FONTS = {
  'IBM Plex Mono':      { label: 'IBM Plex Mono', mono: true },
  'Courier Prime':      { label: 'Courier Prime', mono: true },
  'DM Serif Display':   { label: 'DM Serif Display', mono: false },
  'Josefin Sans':       { label: 'Josefin Sans', mono: false },
  'Libre Baskerville':  { label: 'Libre Baskerville', mono: false },
};

let currentFont = 'IBM Plex Mono';
let currentTheme = 'dark';
let lastExifData = null;
let lastImageFile = null;
let lastImageEl = null;

function updateFont() {
  currentFont = document.getElementById('fontSelect').value;
  if (lastExifData) renderCard(lastExifData, lastImageEl);
}

function updateTheme() {
  currentTheme = document.getElementById('themeSelect').value;
  if (lastExifData) renderCard(lastExifData, lastImageEl);
}

// ── DRAG & DROP ──
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

// ── HASH ──
async function sha256(file) {
  const buf = await file.arrayBuffer();
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  const arr = Array.from(new Uint8Array(hashBuf));
  return arr.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── MAIN FILE HANDLER ──
async function handleFile(file) {
  if (!file) return;
  lastImageFile = file;

  // show preview
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    lastImageEl = img;
    document.getElementById('previewImg').src = url;
    document.getElementById('mainArea').style.display = 'none';
    document.getElementById('results').style.display = 'block';
  };
  img.src = url;

  // hash
  const hash = await sha256(file);

  // exif
  EXIF.getData(file, async function() {
    const all = EXIF.getAllTags(this);
    const get = tag => EXIF.getTag(this, tag);

    // ── Parse fields ──
    const make    = get('Make') || null;
    const model   = get('Model') || null;
    const lens    = get('LensModel') || get('Lens') || null;

    const fnum    = get('FNumber');
    const exp     = get('ExposureTime');
    const iso     = get('ISOSpeedRatings');
    const flen    = get('FocalLength');

    const dtOrig  = get('DateTimeOriginal') || get('DateTime') || null;
    const software= get('Software') || null;

    const latRef  = get('GPSLatitudeRef');
    const lat     = get('GPSLatitude');
    const lonRef  = get('GPSLongitudeRef');
    const lon     = get('GPSLongitude');

    const width   = get('PixelXDimension') || get('ImageWidth') || null;
    const height  = get('PixelYDimension') || get('ImageLength') || null;

    // ── Format helpers ──
    const fmtF    = v => v ? `f/${parseFloat(v).toFixed(1)}` : null;
    const fmtExp  = v => {
      if (!v) return null;
      const s = parseFloat(v);
      if (s < 1) return `1/${Math.round(1/s)}s`;
      return `${s}s`;
    };
    const fmtFlen = v => v ? `${parseFloat(v).toFixed(0)}mm` : null;
    const fmtGPS  = (dms, ref) => {
      if (!dms || !ref) return null;
      const d = parseFloat(dms[0]);
      const m = parseFloat(dms[1]);
      const s2 = parseFloat(dms[2]);
      const dec = d + m/60 + s2/3600;
      return `${(ref === 'S' || ref === 'W') ? '-' : ''}${dec.toFixed(5)}°`;
    };

    const gpsLat = fmtGPS(lat, latRef);
    const gpsLon = fmtGPS(lon, lonRef);

    // ── Flags / Verdict ──
    const flags = [];

    const AI_SOFTWARE = ['stable diffusion', 'midjourney', 'dall-e', 'firefly', 'imagen',
      'nightcafe', 'craiyon', 'bing image', 'runway', 'adobe firefly', 'generative fill',
      'canva ai', 'fotor', 'luminar neo'];
    const isAISoftware = software && AI_SOFTWARE.some(s => software.toLowerCase().includes(s));

    const hasCameraData = !!(make || model);
    const hasExposure   = !!(exp || fnum || iso);

    // ── Definite red flags ──
    if (isAISoftware)              flags.push({ type: 'warn', msg: `AI software detected: ${software}` });
    if (!hasCameraData && !hasExposure) flags.push({ type: 'warn', msg: 'No camera data found — common in AI-generated or screenshot images' });
    if (!dtOrig && !hasCameraData) flags.push({ type: 'warn', msg: 'No capture timestamp found' });
    if (!hasExposure && hasCameraData) flags.push({ type: 'info', msg: 'Exposure data missing — may have been stripped by a platform or editor' });

    // ── Positive signals ──
    if (hasCameraData) flags.push({ type: 'ok', msg: `Camera: ${[make, model].filter(Boolean).join(' ')}` });
    if (hasExposure)   flags.push({ type: 'ok', msg: 'Exposure data recorded by camera' });
    if (dtOrig)        flags.push({ type: 'ok', msg: `Captured: ${dtOrig}` });

    // ── Neutral info ──
    if (!gpsLat) flags.push({ type: 'info', msg: 'No GPS — location not recorded by this camera' });
    if (gpsLat)  flags.push({ type: 'ok',   msg: `Location recorded: ${gpsLat}, ${gpsLon}` });

    // Verdict: only red if we have definite warn flags
    const verdict = flags.some(f => f.type === 'warn') ? 'suspicious' : 'real';

    const exifData = {
      file: { name: file.name, size: `${(file.size/1024).toFixed(1)} KB`, type: file.type },
      camera: { make, model, lens },
      exposure: { fnum: fmtF(fnum), exp: fmtExp(exp), iso: iso ? `ISO ${iso}` : null, flen: fmtFlen(flen) },
      datetime: dtOrig,
      gps: { lat: gpsLat, lon: gpsLon },
      software,
      dimensions: width && height ? `${width} × ${height}` : null,
      hash: hash.slice(0, 32) + '…',
      fullHash: hash,
      flags,
      verdict,
    };

    lastExifData = exifData;
    renderDataPanel(exifData);
    renderCard(exifData, lastImageEl);
    document.getElementById('card-area').style.display = 'block';
  });
}

// ── DATA PANEL (UI) ──
function renderDataPanel(d) {
  const panel = document.getElementById('dataPanel');
  const val = (v, cls='') => v
    ? `<span class="data-val ${cls}">${v}</span>`
    : `<span class="data-val missing">—</span>`;

  const row = (key, value) => `
    <div class="data-row">
      <span class="data-key">${key}</span>
      ${val(value)}
    </div>`;

  const flags = d.flags.map(f => {
    const icon = f.type === 'warn' ? '⚠' : f.type === 'ok' ? '✓' : '·';
    return `<div class="flag ${f.type}">${icon} ${f.msg}</div>`;
  }).join('');

  panel.innerHTML = `
    <div class="verdict ${d.verdict}">
      <span class="verdict-icon">${d.verdict === 'real' ? '✓' : '⚠'}</span>
      <span class="verdict-text">${d.verdict === 'real' ? 'Camera data verified — real photo' : 'Issues detected — see flags below'}</span>
    </div>
    <div class="flags">${flags}</div>

    <div>
      <div class="section-title">Camera</div>
      ${row('Make', d.camera.make)}
      ${row('Model', d.camera.model)}
      ${row('Lens', d.camera.lens)}
    </div>

    <div>
      <div class="section-title">Exposure</div>
      ${row('Aperture', d.exposure.fnum)}
      ${row('Shutter', d.exposure.exp)}
      ${row('ISO', d.exposure.iso)}
      ${row('Focal Length', d.exposure.flen)}
    </div>

    <div>
      <div class="section-title">Capture</div>
      ${row('Date/Time', d.datetime)}
      ${row('Software', d.software)}
      ${row('Dimensions', d.dimensions)}
    </div>

    <div>
      <div class="section-title">Location</div>
      ${row('Latitude', d.gps.lat)}
      ${row('Longitude', d.gps.lon)}
    </div>

    <div>
      <div class="section-title">File</div>
      ${row('Name', d.file.name)}
      ${row('Size', d.file.size)}
      <div class="data-row">
        <span class="data-key">SHA-256</span>
        <span class="data-val hash-val" style="display:flex;align-items:center;gap:8px;">
          <span id="hashDisplay">${d.hash}</span>
          <button onclick="copyHash()" style="background:transparent;border:1px solid var(--border-bright);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;cursor:pointer;white-space:nowrap;" id="copyHashBtn">COPY FULL</button>
        </span>
      </div>
    </div>
  `;
}

// ── CARD CANVAS RENDERER ──
function renderCard(d, img) {
  const canvas = document.getElementById('card-canvas');
  const ctx = canvas.getContext('2d');

  // match aspect ratio of photo
  const aspect = img.naturalWidth / img.naturalHeight;
  const cardW = 2400;
  const cardH = Math.round(cardW / aspect);
  canvas.width = cardW;
  canvas.height = cardH;

  const isDark = currentTheme === 'dark';
  const BG     = isDark ? '#0a0a0a' : '#f5f4f0';
  const FG     = isDark ? '#f0f0f0' : '#111111';
  const DIM    = isDark ? '#555555' : '#999999';
  const DIMMER = isDark ? '#2a2a2a' : '#dddddd';
  const BORDER = isDark ? '#222222' : '#cccccc';
  const WARN   = '#ff4444';
  const OK_C   = isDark ? '#88cc88' : '#228822';
  const font   = currentFont;

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, cardW, cardH);

  // thin border
  ctx.strokeStyle = BORDER;
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, cardW - 1, cardH - 1);

  const pad = Math.round(cardH * 0.055);
  let y = pad;

  // ── HEADER ──
  ctx.fillStyle = DIM;
  ctx.font = `300 ${Math.round(cardH * 0.022)}px 'Bebas Neue', sans-serif`;
  ctx.letterSpacing = '4px';
  ctx.fillText('AUTHENTICITY INSPECTOR', pad, y + Math.round(cardH * 0.022));

  // horizontal rule
  y += Math.round(cardH * 0.038);
  ctx.strokeStyle = BORDER;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad, y); ctx.lineTo(cardW - pad, y); ctx.stroke();
  y += Math.round(cardH * 0.032);

  // ── VERDICT BADGE ──
  const badgeH = Math.round(cardH * 0.058);
  const isReal = d.verdict === 'real';
  ctx.fillStyle = isReal
    ? (isDark ? 'rgba(170,255,170,0.08)' : 'rgba(0,120,0,0.07)')
    : (isDark ? 'rgba(255,68,68,0.10)'   : 'rgba(200,0,0,0.07)');
  ctx.fillRect(pad, y, cardW - pad*2, badgeH);
  ctx.strokeStyle = isReal ? OK_C : WARN;
  ctx.lineWidth = 1;
  ctx.strokeRect(pad + 0.5, y + 0.5, cardW - pad*2 - 1, badgeH - 1);

  const vFontSz = Math.round(cardH * 0.020);
  ctx.font = `600 ${vFontSz}px '${font}', monospace`;
  ctx.fillStyle = isReal ? OK_C : WARN;
  ctx.letterSpacing = '2px';
  const vIcon = isReal ? '✓' : '⚠';
  const vText = isReal ? `${vIcon}  CAMERA DATA VERIFIED — REAL PHOTO` : `${vIcon}  ISSUES DETECTED`;
  ctx.fillText(vText, pad + 16, y + badgeH / 2 + vFontSz * 0.36);
  y += badgeH + Math.round(cardH * 0.035);

  // ── FLAGS (warnings only on card) ──
  const warns = d.flags.filter(f => f.type === 'warn');
  if (warns.length > 0) {
    const flagSz = Math.round(cardH * 0.016);
    ctx.font = `400 ${flagSz}px '${font}', monospace`;
    ctx.letterSpacing = '1px';
    warns.forEach(f => {
      ctx.fillStyle = WARN;
      ctx.fillText(`⚠  ${f.msg}`, pad, y);
      y += Math.round(flagSz * 1.8);
    });
    y += Math.round(cardH * 0.015);
  }

  // ── DATA COLUMNS ──
  // Build rows
  const orDash = v => v || '—';
  const sections = [
    {
      title: 'CAMERA',
      rows: [
        ['Make',    orDash(d.camera.make)],
        ['Model',   orDash(d.camera.model)],
        ['Lens',    orDash(d.camera.lens)],
      ]
    },
    {
      title: 'EXPOSURE',
      rows: [
        ['Aperture',  orDash(d.exposure.fnum)],
        ['Shutter',   orDash(d.exposure.exp)],
        ['ISO',       orDash(d.exposure.iso)],
        ['Focal Len', orDash(d.exposure.flen)],
      ]
    },
    {
      title: 'CAPTURE',
      rows: [
        ['Date/Time', orDash(d.datetime)],
        ['Software',  orDash(d.software)],
        ['Size',      orDash(d.dimensions)],
        ['File',      d.file.name],
      ]
    },
    {
      title: 'LOCATION',
      rows: [
        ['Latitude',  orDash(d.gps.lat)],
        ['Longitude', orDash(d.gps.lon)],
      ]
    }
  ];

  const colW = (cardW - pad * 2) / 2;
  const keyFontSz  = Math.round(cardH * 0.014);
  const valFontSz  = Math.round(cardH * 0.017);
  const secTitleSz = Math.round(cardH * 0.013);
  const rowH = Math.round(cardH * 0.042);

  // arrange sections in 2 columns
  const col0 = [sections[0], sections[1]];
  const col1 = [sections[2], sections[3]];

  [col0, col1].forEach((cols, ci) => {
    let cy = y;
    cols.forEach(sec => {
      // section title
      ctx.font = `300 ${secTitleSz}px '${font}', monospace`;
      ctx.letterSpacing = '3px';
      ctx.fillStyle = DIM;
      ctx.fillText(sec.title, pad + ci * colW, cy);
      cy += Math.round(secTitleSz * 1.6);

      // rule
      ctx.strokeStyle = DIMMER;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad + ci * colW, cy);
      ctx.lineTo(pad + ci * colW + colW - 16, cy);
      ctx.stroke();
      cy += Math.round(cardH * 0.012);

      sec.rows.forEach(([k, v]) => {
        const isMissing = v === '—';
        // key
        ctx.font = `300 ${keyFontSz}px '${font}', monospace`;
        ctx.letterSpacing = '2px';
        ctx.fillStyle = DIM;
        ctx.fillText(k.toUpperCase(), pad + ci * colW, cy + rowH * 0.6);
        // value
        ctx.font = `400 ${valFontSz}px '${font}', monospace`;
        ctx.letterSpacing = '0.5px';
        ctx.fillStyle = isMissing ? DIMMER : FG;

        // truncate long values
        let vDisplay = v;
        const maxValW = colW - 100;
        while (ctx.measureText(vDisplay).width > maxValW && vDisplay.length > 6) {
          vDisplay = vDisplay.slice(0, -2) + '…';
        }
        ctx.fillText(vDisplay, pad + ci * colW + colW * 0.38, cy + rowH * 0.6);
        cy += rowH;
      });

      cy += Math.round(cardH * 0.025);
    });
  });

  // ── FOOTER ──
  const footerY = cardH - Math.round(cardH * 0.045);
  ctx.strokeStyle = BORDER;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad, footerY - 8); ctx.lineTo(cardW - pad, footerY - 8); ctx.stroke();

  ctx.font = `300 ${Math.round(cardH * 0.013)}px '${font}', monospace`;
  ctx.letterSpacing = '1px';
  ctx.fillStyle = DIM;
  ctx.fillText(`SHA-256: ${d.hash}`, pad, footerY + Math.round(cardH * 0.018));
  ctx.fillStyle = DIMMER;
  ctx.textAlign = 'right';
  ctx.fillText('authenticity-inspector', cardW - pad, footerY + Math.round(cardH * 0.018));
  ctx.textAlign = 'left';
}

function copyHash() {
  if (!lastExifData?.fullHash) return;
  navigator.clipboard.writeText(lastExifData.fullHash).then(() => {
    const btn = document.getElementById('copyHashBtn');
    btn.textContent = 'COPIED!';
    btn.style.color = 'var(--ok)';
    btn.style.borderColor = 'var(--ok)';
    setTimeout(() => {
      btn.textContent = 'COPY FULL';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}

function resetTool() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('mainArea').style.display = 'flex';
  document.getElementById('previewImg').src = '';
  document.getElementById('fileInput').value = '';
  lastExifData = null;
  lastImageFile = null;
  lastImageEl = null;
}

function downloadCard() {
  const canvas = document.getElementById('card-canvas');
  const link = document.createElement('a');
  const base = (lastImageFile?.name || 'photo').replace(/\.[^.]+$/, '');
  link.download = `${base}_authenticity.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
